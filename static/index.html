<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 面试官 — Cybernetic Command</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+SC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/css/style.css">
    <!-- Markdown 渲染: highlight.js 代码高亮主题 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
</head>
<body>
    <div class="command-center">
        <!-- ============ 顶部指挥条 ============ -->
        <header class="command-bar">
            <div class="command-bar-left">
                <button class="icon-btn sidebar-toggle-btn" id="sidebar-toggle" title="控制面板">
                    <i class="fas fa-sliders-h"></i>
                </button>
                <div class="brand">
                    <div class="brand-icon">
                        <i class="fas fa-satellite-dish"></i>
                    </div>
                    <div class="brand-text">
                        <h1>AI Interview</h1>
                        <span class="brand-sub">Cybernetic Command</span>
                    </div>
                </div>
            </div>
            <div class="command-bar-center">
                <!-- 面试阶段进度条 -->
                <div class="phase-timeline" id="phase-indicator">
                    <div class="phase-node active" data-phase="0" title="开始">
                        <div class="node-dot"></div>
                        <span class="node-label">开始</span>
                    </div>
                    <div class="phase-line"></div>
                    <div class="phase-node" data-phase="1" title="自我介绍">
                        <div class="node-dot"></div>
                        <span class="node-label">介绍</span>
                    </div>
                    <div class="phase-line"></div>
                    <div class="phase-node" data-phase="3" title="项目">
                        <div class="node-dot"></div>
                        <span class="node-label">项目</span>
                    </div>
                    <div class="phase-line"></div>
                    <div class="phase-node" data-phase="5" title="技术">
                        <div class="node-dot"></div>
                        <span class="node-label">技术</span>
                    </div>
                    <div class="phase-line"></div>
                    <div class="phase-node" data-phase="6" title="代码">
                        <div class="node-dot"></div>
                        <span class="node-label">代码</span>
                    </div>
                    <div class="phase-line"></div>
                    <div class="phase-node" data-phase="7" title="反问">
                        <div class="node-dot"></div>
                        <span class="node-label">反问</span>
                    </div>
                    <div class="phase-line"></div>
                    <div class="phase-node" data-phase="8" title="结束">
                        <div class="node-dot"></div>
                        <span class="node-label">结束</span>
                    </div>
                </div>
            </div>
            <div class="command-bar-right">
                <button class="icon-btn" id="new-chat-btn" title="新对话">
                    <i class="fas fa-plus"></i>
                </button>
                <button class="icon-btn" id="toggle-report-btn" title="面试报告">
                    <i class="fas fa-chart-bar"></i>
                </button>
                <button class="icon-btn" id="toggle-rag-btn" title="知识库">
                    <i class="fas fa-database"></i>
                </button>
            </div>
        </header>

        <!-- ============ 主体区域 ============ -->
        <div class="command-body">

            <!-- ====== 左侧控制面板 ====== -->
            <aside class="control-panel" id="sidebar">
                <div class="panel-section">
                    <div class="panel-section-title">
                        <i class="fas fa-user-tie"></i> 面试官人格
                    </div>
                    <select id="prompt-select" class="cyber-select">
                        <option value="温和型面试官">温和型面试官</option>
                        <option value="正常型面试官（默认）" selected>正常型面试官</option>
                        <option value="压力型面试官">压力型面试官</option>
                        <option value="自定义">自定义</option>
                    </select>
                    <div class="collapsible-trigger" id="prompt-toggle">
                        <span>微调提示词</span>
                        <i class="fas fa-chevron-down arrow-icon"></i>
                    </div>
                    <div class="collapsible-body" id="prompt-content">
                        <textarea id="system-prompt" rows="5" placeholder="系统提示词..."></textarea>
                    </div>
                </div>

                <div class="panel-divider"></div>

                <div class="panel-section">
                    <div class="panel-section-title">
                        <i class="fas fa-microphone-alt"></i> 语音控制
                    </div>
                    <label class="cyber-toggle">
                        <input type="checkbox" id="enable-tts" checked>
                        <span class="toggle-slider"></span>
                        <span class="toggle-text">TTS 语音播报</span>
                    </label>
                </div>

                <div class="panel-divider"></div>

                <div class="panel-section">
                    <div class="panel-section-title">
                        <i class="fas fa-brain"></i> 知识库 (RAG)
                    </div>
                    <label class="cyber-toggle">
                        <input type="checkbox" id="enable-rag" checked>
                        <span class="toggle-slider"></span>
                        <span class="toggle-text">知识库检索</span>
                    </label>
                    <div class="rag-settings" id="rag-settings">
                        <label class="field-label">检索领域</label>
                        <select id="rag-domain" class="cyber-select">
                            <option value="cs">cs</option>
                        </select>
                        <label class="field-label">Top-K: <span id="topk-value">6</span></label>
                        <input type="range" id="rag-topk" min="1" max="15" value="6" class="cyber-range">
                    </div>
                </div>

                <div class="panel-divider"></div>

                <div class="panel-section">
                    <div class="panel-section-title">
                        <i class="fas fa-file-alt"></i> 简历上传
                    </div>
                    <div id="resume-status">
                        <p class="hint-text">上传 PDF 简历，AI 将更了解你</p>
                    </div>
                    <div id="resume-upload-area">
                        <input type="file" id="resume-input" accept=".pdf" style="display: none;">
                        <button class="cyber-btn cyber-btn-accent full-width" id="resume-upload-btn">
                            <i class="fas fa-cloud-upload-alt"></i> 选择 PDF 简历
                        </button>
                    </div>
                    <div id="resume-uploaded" style="display: none;">
                        <div class="resume-file-row">
                            <i class="fas fa-file-pdf file-icon"></i>
                            <span id="resume-file-name" class="file-name-text"></span>
                        </div>
                        <button class="cyber-btn cyber-btn-danger cyber-btn-sm" id="resume-delete-btn">
                            <i class="fas fa-trash-alt"></i> 删除
                        </button>
                    </div>
                    <div id="resume-progress" style="display: none;">
                        <div class="progress-track">
                            <div class="progress-glow" id="resume-progress-fill"></div>
                        </div>
                        <p class="hint-text" id="resume-progress-text">正在解析...</p>
                    </div>
                </div>

                <div class="panel-footer">
                    <p class="hint-text">录音需授权麦克风 · TTS 流式播报</p>
                </div>
            </aside>

            <!-- ====== 中央主舞台 ====== -->
            <main class="main-stage">
                <div class="chat-viewport" id="chat-history">
                    <div class="empty-state">
                        <div class="empty-state-icon">
                            <i class="fas fa-satellite"></i>
                        </div>
                        <h3>准备就绪</h3>
                        <p>输入文字或点击麦克风，开始你的面试之旅</p>
                    </div>
                </div>
                <div id="voice-history" style="display:none;"></div>

                <!-- TTS 浮层 -->
                <div class="tts-float" id="tts-player">
                    <div class="tts-float-inner">
                        <div class="tts-info">
                            <i class="fas fa-volume-up"></i>
                            <span id="tts-status">等待中</span>
                        </div>
                        <div class="tts-controls-bar">
                            <button class="tts-ctrl-btn" id="tts-play" title="播放"><i class="fas fa-play"></i></button>
                            <button class="tts-ctrl-btn" id="tts-pause" title="暂停"><i class="fas fa-pause"></i></button>
                            <button class="tts-ctrl-btn" id="tts-stop" title="停止"><i class="fas fa-stop"></i></button>
                            <div class="tts-progress-track">
                                <div class="tts-progress-bar" id="tts-progress-bar"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 输入栏 -->
                <div class="input-dock">
                    <button class="record-orb" id="record-btn" title="语音输入">
                        <span class="orb-ring"></span>
                        <span class="orb-ring orb-ring-2"></span>
                        <i class="fas fa-microphone" id="record-icon-i"></i>
                    </button>
                    <div class="recording-badge" id="recording-indicator">
                        <span class="rec-pulse"></span>
                        <span>录音中...</span>
                    </div>
                    <form class="input-form" id="chat-form">
                        <input type="text" id="chat-input" placeholder="输入你的回答..." autocomplete="off">
                        <button type="submit" class="send-btn" title="发送">
                            <i class="fas fa-paper-plane"></i>
                        </button>
                    </form>
                </div>
            </main>

            <!-- ====== 右侧 IDE 面板 ====== -->
            <aside class="ide-panel" id="ide-panel">
                <div class="ide-header">
                    <div class="ide-title">
                        <i class="fas fa-code"></i> 代码编辑器
                    </div>
                    <button class="icon-btn icon-btn-ghost" id="ide-close-btn" title="关闭">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                <div class="ide-body">
                    <div class="ide-toolbar">
                        <label>语言:</label>
                        <select id="code-language" class="cyber-select cyber-select-sm">
                            <option value="python" selected>Python</option>
                            <option value="java">Java</option>
                            <option value="cpp">C++</option>
                            <option value="javascript">JavaScript</option>
                        </select>
                    </div>
                    <div class="code-editor-wrapper">
                        <div class="line-numbers" id="line-numbers">1</div>
                        <textarea id="code-editor" placeholder="# 在这里编写你的代码...&#10;&#10;def solution():&#10;    pass" spellcheck="false"></textarea>
                    </div>
                    <div class="ide-actions">
                        <button class="cyber-btn cyber-btn-success" id="submit-code-btn">
                            <i class="fas fa-paper-plane"></i> 提交
                        </button>
                        <button class="cyber-btn cyber-btn-ghost" id="clear-code-btn">
                            <i class="fas fa-eraser"></i> 清空
                        </button>
                    </div>
                    <div class="code-history" id="code-history">
                        <h4><i class="fas fa-history"></i> 提交历史</h4>
                        <div class="history-list" id="history-list">
                            <p class="hint-text">暂无提交记录</p>
                        </div>
                    </div>
                </div>
            </aside>

            <!-- ====== RAG 抽屉 ====== -->
            <aside class="side-drawer rag-drawer" id="rag-drawer">
                <div class="drawer-header">
                    <h3><i class="fas fa-database"></i> RAG 知识检索</h3>
                    <button class="icon-btn icon-btn-ghost" id="rag-close-btn">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                <div class="drawer-body" id="rag-history">
                    <div class="empty-state-mini">
                        <i class="fas fa-search"></i>
                        <p>暂无检索记录</p>
                    </div>
                </div>
            </aside>

            <!-- ====== 报告抽屉 ====== -->
            <aside class="side-drawer report-drawer" id="report-drawer">
                <div class="drawer-header">
                    <h3><i class="fas fa-chart-bar"></i> 面试报告</h3>
                    <button class="icon-btn icon-btn-ghost" id="report-close-btn">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                <div class="drawer-body">
                    <div class="report-stats" id="report-stats">
                        <div class="stat-card">
                            <span class="stat-value" id="msg-count">0</span>
                            <span class="stat-label">消息数</span>
                        </div>
                    </div>
                    <div class="report-actions-row">
                        <button class="cyber-btn cyber-btn-ghost" id="download-json">
                            <i class="fas fa-file-code"></i> JSON
                        </button>
                        <button class="cyber-btn cyber-btn-ghost" id="download-txt">
                            <i class="fas fa-file-alt"></i> TXT
                        </button>
                    </div>
                    <button class="cyber-btn cyber-btn-accent full-width" id="generate-report-btn" style="margin-top:16px;">
                        <i class="fas fa-robot"></i> 生成 AI 评价报告
                    </button>
                    <div class="report-content" id="report-content"></div>
                    <div class="report-download" id="report-download" style="display:none; margin-top:12px;">
                        <button class="cyber-btn cyber-btn-ghost full-width" id="download-report-md">
                            <i class="fas fa-download"></i> 下载 Markdown
                        </button>
                    </div>
                </div>
            </aside>

        </div>
    </div>

    <!-- 加载覆盖层 -->
    <div class="loading-overlay" id="loading-overlay">
        <div class="loading-orb">
            <div class="spinner-ring"></div>
            <div class="spinner-ring spinner-ring-2"></div>
        </div>
        <p id="loading-text">正在处理...</p>
    </div>

    <!-- JavaScript -->
    <!-- Markdown 渲染依赖 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="/static/js/markdown-renderer.js?v=3"></script>

    <script src="/static/js/tts-stream.js"></script>
    <script src="/static/js/audio.js"></script>
    <script src="/static/js/chat.js?v=3"></script>
    <script src="/static/js/app.js?v=3"></script>
</body>
</html>
